services:
  user-db:
    image: mariadb:latest
    container_name: user-service-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-user_service_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: ${DOCKER_IMAGE:-ghcr.io/buithienhoang221204/api-user-service:latest}
    container_name: user-service-app
    restart: always
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - DB_HOST=user-db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_DATABASE=${DB_DATABASE:-user_service_db}
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mariadb_data:
